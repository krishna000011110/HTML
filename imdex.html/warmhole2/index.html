<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Three Tunnel</title>

    <style>
        body { margin: 0; overflow: hidden; }
    </style>

    <!-- Import map (ye HEAD me hi hona chahiye) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js",
            "jsm/": "https://cdn.jsdelivr.net/npm/three@0.161/examples/jsm/"
        }
    }
    </script>
</head>

<body>

<!-- IMPORTANT: type="module" warna imports nahi chalenge -->
<script type="module">

import * as THREE from "three";
import { OrbitControls } from "jsm/controls/OrbitControls.js";
import { EffectComposer } from "jsm/postprocessing/EffectComposer.js";
import { RenderPass } from "jsm/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "jsm/postprocessing/UnrealBloomPass.js";

const w = window.innerWidth;
const h = window.innerHeight;
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.7);

const camera = new THREE.PerspectiveCamera(75, w / h, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer();
renderer.setSize(w, h);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.03;

const renderScene = new RenderPass(scene, camera);
const bloomPass = new UnrealBloomPass(new THREE.Vector2(w, h), 1.5, 0.4, 100);
bloomPass.threshold = 0.002;
bloomPass.strength = 7;
bloomPass.radius = 0;

const composer = new EffectComposer(renderer);
composer.addPass(renderScene);
composer.addPass(bloomPass);

/* -------- YOUR ORIGINAL PATH DATA -------- */

const curvePath = [/* ... tumhara same array yahan rahega ... */];

/* ---------------------------------------- */

const pointst = [];
for (let p = 0; p < curvePath.length; p += 3) {
    pointst.push(
        new THREE.Vector3(curvePath[p], curvePath[p + 1], curvePath[p + 2])
    );
}

const spline = new THREE.CatmullRomCurve3(pointst);
const run = new THREE.TubeGeometry(spline, 222, 0.65, 16, true);

const vertices = run.attributes.position;
const pointGeometry = new THREE.SphereGeometry(0.01, 8, 8);

const colors = [0x00ff00, 0xffff00, 0x4499ff];

for (let i = 0; i < vertices.count; i++) {
    const x = vertices.getX(i);
    const y = vertices.getY(i);
    const z = vertices.getZ(i);

    const pointMaterial = new THREE.MeshBasicMaterial({
        color: colors[i % colors.length]
    });

    const pointMesh = new THREE.Mesh(pointGeometry, pointMaterial);
    pointMesh.position.set(x, y, z);
    scene.add(pointMesh);
}

const edges = new THREE.EdgesGeometry(run, 0.35);
const lineMat = new THREE.LineBasicMaterial({ color: 0x4499ff });
const line2 = new THREE.LineSegments(edges, lineMat);
scene.add(line2);

function updateCamera(t) {
    const time = t * 0.1;
    const loopTime = 20 * 400;
    const p = (time % loopTime) / loopTime;

    const pos = run.parameters.path.getPointAt(p);
    const lookAt = run.parameters.path.getPointAt((p + 0.01) % 1);

    camera.position.copy(pos);
    camera.lookAt(lookAt);
}

function animate(t = 0) {
    requestAnimationFrame(animate);
    updateCamera(t);
    composer.render(scene, camera);
    controls.update();
}

animate();

window.addEventListener("resize", () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

</script>
</body>
</html>
