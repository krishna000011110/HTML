<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Shader Visualizer</title>
</head>
<body>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    #canvas-container { 
        width: 100vw; 
        height: 100vh; 
        background-color: #050505; 
        overflow: hidden; 
        display: block;
    }
    
    .glass-panel {
        background: rgba(10, 10, 12, 0.65);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        padding: 16px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        pointer-events: auto;
        user-select: none;
        z-index: 10;
        transition: border-color 0.5s ease, box-shadow 0.5s ease;
        font-family: 'Inter', sans-serif;
    }

    #info {
        position: absolute;
        top: 20px;
        left: 20px;
        color: #e0e0e0;
        min-width: 200px;
        pointer-events: none;
        overflow: hidden; 
    }

    #info::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 3px;
        height: 100%;
        background: var(--accent-color, #00ffc8);
        box-shadow: 0 0 15px var(--accent-color, #00ffc8);
        transition: background-color 1s ease, box-shadow 1s ease;
        animation: barPulse 3s ease-in-out infinite;
    }

    @keyframes barPulse {
        0%, 100% { transform: scaleY(1); opacity: 1; }
        50% { transform: scaleY(0.4); opacity: 0.6; }
    }

    .scan-line {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--accent-color, #00ffc8), transparent);
        opacity: 0.5;
        animation: scan 4s linear infinite;
    }

    @keyframes scan {
        0% { transform: translateY(-100%); opacity: 0; }
        10% { opacity: 0.8; }
        90% { opacity: 0.8; }
        100% { transform: translateY(400px); opacity: 0; }
    }

    .label {
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #666;
        margin-bottom: 2px;
        font-weight: 700;
    }

    h3 { 
        margin: 0 0 12px 0; 
        font-weight: 500; 
        font-size: 13px; 
        color: #fff; 
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    h3::after {
        content: '';
        flex-grow: 1;
        height: 1px;
        background: linear-gradient(90deg, rgba(255,255,255,0.1), transparent);
    }

    .stat-row { 
        display: flex; 
        justify-content: space-between; 
        align-items: center;
        margin-bottom: 4px; 
        font-size: 11px; 
    }

    .param-label { color: #888; }

    .param-value { 
        color: var(--accent-color, #00ffc8); 
        font-weight: 700; 
        font-family: 'JetBrains Mono', monospace; 
        transition: color 1s ease;
    }

    #theme-section {
        margin-top: 12px;
        padding-top: 8px;
        border-top: 1px solid rgba(255,255,255,0.05);
    }

    #current-theme-name { 
        color: #fff; 
        font-weight: 300; 
        font-size: 15px; 
        margin-top: 2px; 
        display: block; 
        letter-spacing: -0.5px;
    }

    #music-player {
        position: absolute;
        bottom: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 140px;
        border-bottom: 2px solid var(--accent-color, #00ffc8);
        transition: border-color 1s ease;
    }

    .music-title {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #fff;
        margin-bottom: 12px;
        opacity: 0.8;
        font-weight: 500;
    }

    .controls {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: center;
    }

    .control-btn {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s ease;
        outline: none;
    }

    .control-btn:hover {
        background: var(--accent-color, #00ffc8);
        border-color: var(--accent-color, #00ffc8);
        color: #000;
        box-shadow: 0 0 15px var(--accent-color, #00ffc8);
        transform: scale(1.1);
    }

    .control-btn:active {
        transform: scale(0.95);
    }

    .control-btn svg {
        width: 14px;
        height: 14px;
        fill: currentColor;
    }

    .equalizer {
        display: flex;
        gap: 2px;
        height: 12px;
        align-items: flex-end;
        margin-top: 8px;
        opacity: 0;
        transition: opacity 0.5s ease;
    }

    .equalizer.active {
        opacity: 1;
    }

    .bar {
        width: 3px;
        background: var(--accent-color, #00ffc8);
        animation: eq 1s ease-in-out infinite;
    }

    .bar:nth-child(1) { animation-duration: 0.8s; height: 6px; }
    .bar:nth-child(2) { animation-duration: 1.1s; height: 10px; }
    .bar:nth-child(3) { animation-duration: 0.9s; height: 8px; }
    .bar:nth-child(4) { animation-duration: 1.2s; height: 5px; }

    @keyframes eq {
        0%, 100% { height: 4px; opacity: 0.5; }
        50% { height: 100%; opacity: 1; }
    }
</style>

<script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
</script>

<div id="info" class="glass-panel">
    <div class="scan-line"></div>
    <div class="label">System Status</div>
    <h3>Online / Rendering</h3>
    <div class="stat-row">
        <span class="param-label">Geometry</span> 
        <span style="color:#fff; font-weight:500;">Superformula</span>
    </div>
    <div class="stat-row">
        <span class="param-label">Factor M</span> 
        <span class="param-value" id="val-m">--</span>
    </div>
    <div class="stat-row">
        <span class="param-label">Factor N1</span> 
        <span class="param-value" id="val-n1">--</span>
    </div>
    <div class="stat-row">
        <span class="param-label">Factor N2</span> 
        <span class="param-value" id="val-n2">--</span>
    </div>
    <div class="stat-row">
        <span class="param-label">Factor N3</span> 
        <span class="param-value" id="val-n3">--</span>
    </div>
    <div class="stat-row">
        <span class="param-label">Nodes</span> 
        <span class="param-value">300k</span>
    </div>
    <div id="theme-section">
        <div class="label">Current Sequence</div>
        <span id="current-theme-name">Initializing...</span>
    </div>
</div>

<div id="music-player" class="glass-panel">
    <div class="music-title">Audio Interface</div>
    <div class="controls">
        <button class="control-btn" id="btn-play" title="Play">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="control-btn" id="btn-pause" title="Pause" style="display: none;">
            <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="control-btn" id="btn-stop" title="Stop">
            <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
        </button>
    </div>
    <div class="equalizer" id="eq-viz">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>
    <audio id="bg-music" loop>
        <source src="https://static.wixstatic.com/mp3/3d9313_4f8469dbff9547a4836a026c021299c1.mp3" type="audio/mp3">
    </audio>
</div>

<div id="canvas-container"></div>

<script type="x-shader/x-vertex" id="vertexshader">
    attribute float lineDistance;
    uniform float time;
    uniform float morphProgress;
    varying float vDistance;
    varying float vDepth;
    varying vec3 vPos;
    void main() {
        vDistance = lineDistance;
        vPos = position;
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        vDepth = -mvPosition.z; 
        gl_Position = projectionMatrix * mvPosition;
    }
</script>

<script type="x-shader/x-fragment" id="fragmentshader">
    uniform float time;
    uniform vec3 uColorA1;
    uniform vec3 uColorA2;
    uniform vec3 uColorA3;
    uniform vec3 uColorB1;
    uniform vec3 uColorB2;
    uniform vec3 uColorB3;
    uniform float uTransition; 
    varying float vDistance;
    varying float vDepth;
    varying vec3 vPos;
    void main() {
        vec3 c1 = mix(uColorA1, uColorB1, uTransition); 
        vec3 c2 = mix(uColorA2, uColorB2, uTransition); 
        vec3 c3 = mix(uColorA3, uColorB3, uTransition); 
        float flowFrequency = 150.0;
        float flowSpeed = 4.0;
        float flow = fract(vDistance * flowFrequency - time * flowSpeed);
        float pulse = smoothstep(0.2, 0.98, flow);
        float head = smoothstep(0.95, 1.0, flow) * 3.0; 
        vec3 finalColor = c1 * 0.1; 
        finalColor += c3 * pulse * 3.0;
        finalColor += c2 * head;
        float alpha = 0.05; 
        alpha += pulse * 0.5;
        alpha += head; 
        float depthFade = 1.0 - smoothstep(100.0, 400.0, vDepth);
        alpha *= depthFade;
        float heightFade = smoothstep(-80.0, 80.0, vPos.y);
        alpha *= (0.6 + 0.4 * heightFade);
        gl_FragColor = vec4(finalColor, clamp(alpha, 0.0, 1.0));
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    const CONFIG = {
        points: 300000, 
        baseScale: 30.0,
        m: 0, n1: 0, n2: 0, n3: 0,
        a: 1, b: 1
    };

    const SHAPES = [
        {
            name: "Quantum Star",
            params: { m: 7, n1: 0.2, n2: 1.7, n3: 1.7, a: 1, b: 1 },
            scaleMultiplier: 1.0,
            accent: [0x001133, 0x00ffff, 0x0066ff]
        },
        {
            name: "Hyper-Thorn",
            params: { m: 19, n1: 0.5, n2: 0.2, n3: 0.2, a: 1, b: 1 },
            scaleMultiplier: 1.5,
            accent: [0x220000, 0xff0000, 0xaa0000]
        },
        {
            name: "Void Prism",
            params: { m: 6, n1: 0.4, n2: 1, n3: 1, a: 1, b: 1 },
            scaleMultiplier: 1.2, 
            accent: [0x110022, 0xff00ff, 0xaa00ff]
        },
        {
            name: "Cosmic Shell",
            params: { m: 12, n1: 0.5, n2: 0.5, n3: 0.5, a: 1, b: 1 },
            scaleMultiplier: 1.0,
            accent: [0x331100, 0xffaa00, 0xff4400]
        },
        {
            name: "Vortex Flower",
            params: { m: 5, n1: 18, n2: 4, n3: 2, a: 1, b: 1 },
            scaleMultiplier: 1.0,
            accent: [0x220022, 0xff00ff, 0xaa00aa]
        }
    ];

    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505); 
    scene.fog = new THREE.FogExp2(0x050505, 0.001);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 0, 75);

    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.5; 

    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0.1; 
    bloomPass.strength = 0.8; 
    bloomPass.radius = 0.4;
    const outputPass = new OutputPass();
    const composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);
    composer.addPass(outputPass);

    function superShape(theta, m, n1, n2, n3, a, b) {
        let t1 = Math.abs((1/a) * Math.cos(m * theta / 4));
        t1 = Math.pow(t1, n2);
        let t2 = Math.abs((1/b) * Math.sin(m * theta / 4));
        t2 = Math.pow(t2, n3);
        let t3 = t1 + t2;
        let r = Math.pow(t3, -1 / n1);
        return r;
    }

    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(CONFIG.points * 3);
    const lineDistances = new Float32Array(CONFIG.points);
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    for (let i = 0; i < CONFIG.points; i++) {
        lineDistances[i] = i / CONFIG.points;
    }
    geometry.setAttribute('lineDistance', new THREE.BufferAttribute(lineDistances, 1));

    const material = new THREE.ShaderMaterial({
        uniforms: {
            time: { value: 0.0 },
            uTransition: { value: 0.0 },
            uColorA1: { value: new THREE.Color() },
            uColorA2: { value: new THREE.Color() },
            uColorA3: { value: new THREE.Color() },
            uColorB1: { value: new THREE.Color() },
            uColorB2: { value: new THREE.Color() },
            uColorB3: { value: new THREE.Color() },
        },
        vertexShader: document.getElementById('vertexshader').textContent,
        fragmentShader: document.getElementById('fragmentshader').textContent,
        blending: THREE.AdditiveBlending,
        depthTest: false,
        transparent: true,
        side: THREE.DoubleSide
    });

    const line = new THREE.Line(geometry, material);
    line.geometry.computeBoundingSphere();
    scene.add(line);

    const starsGeometry = new THREE.BufferGeometry();
    const starsPositions = new Float32Array(5000 * 3);
    for (let i = 0; i < 5000 * 3; i += 3) {
        starsPositions[i] = THREE.MathUtils.randFloatSpread(2000);
        starsPositions[i + 1] = THREE.MathUtils.randFloatSpread(2000);
        starsPositions[i + 2] = THREE.MathUtils.randFloatSpread(2000);
    }
    starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
    const starsMaterial = new THREE.PointsMaterial({ color: 0xaaaaaa, size: 0.1, transparent: true });
    const stars = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(stars);

    const audio = document.getElementById('bg-music');
    const btnPlay = document.getElementById('btn-play');
    const btnPause = document.getElementById('btn-pause');
    const btnStop = document.getElementById('btn-stop');
    const eqViz = document.getElementById('eq-viz');
    audio.volume = 0.7;

    function playMusic() {
        audio.play().then(() => {
            btnPlay.style.display = 'none';
            btnPause.style.display = 'flex';
            eqViz.classList.add('active');
        }).catch(e => {});
    }

    function pauseMusic() {
        audio.pause();
        btnPause.style.display = 'none';
        btnPlay.style.display = 'flex';
        eqViz.classList.remove('active');
    }

    function stopMusic() {
        audio.pause();
        audio.currentTime = 0;
        btnPause.style.display = 'none';
        btnPlay.style.display = 'flex';
        eqViz.classList.remove('active');
    }

    btnPlay.addEventListener('click', playMusic);
    btnPause.addEventListener('click', pauseMusic);
    btnStop.addEventListener('click', stopMusic);

    class ShapeManager {
        constructor() {
            this.currentIndex = 0;
            this.nextIndex = 1;
            this.transitionStartTime = 0;
            this.isTransitioning = false;
            this.duration = 2000;
            this.holdTime = 3000; 
            this.lastSwitchTime = Date.now();
            this.currentParams = { ...SHAPES[0].params };
            this.currentScaleMult = SHAPES[0].scaleMultiplier;
            this.setInitialState();
        }

        setInitialState() {
            const s = SHAPES[this.currentIndex];
            material.uniforms.uColorA1.value.setHex(s.accent[0]);
            material.uniforms.uColorA2.value.setHex(s.accent[1]);
            material.uniforms.uColorA3.value.setHex(s.accent[2]);
            material.uniforms.uColorB1.value.setHex(s.accent[0]);
            material.uniforms.uColorB2.value.setHex(s.accent[1]);
            material.uniforms.uColorB3.value.setHex(s.accent[2]);
            this.currentParams = { ...s.params };
            this.currentScaleMult = s.scaleMultiplier;
            this.updateGeometry();
            this.updateUI(s.name, s.accent[1]);
        }

        updateUI(name, colorHex) {
            const el = document.getElementById('current-theme-name');
            const valM = document.getElementById('val-m');
            const valN1 = document.getElementById('val-n1');
            const valN2 = document.getElementById('val-n2');
            const valN3 = document.getElementById('val-n3');
            const infoPanel = document.getElementById('info');
            const musicPanel = document.getElementById('music-player');
            const c = new THREE.Color(colorHex);
            const cssColor = `rgb(${Math.floor(c.r*255)}, ${Math.floor(c.g*255)}, ${Math.floor(c.b*255)})`;
            infoPanel.style.setProperty('--accent-color', cssColor);
            musicPanel.style.setProperty('--accent-color', cssColor);
            el.textContent = name;
            valM.textContent = this.currentParams.m.toFixed(1);
            valN1.textContent = this.currentParams.n1.toFixed(1);
            valN2.textContent = this.currentParams.n2.toFixed(1);
            valN3.textContent = this.currentParams.n3.toFixed(1);
        }

        updateGeometry() {
            const posAttribute = geometry.attributes.position;
            const arr = posAttribute.array;
            const p = this.currentParams;
            const finalScale = CONFIG.baseScale * this.currentScaleMult; 
            let idx = 0;
            const totalPoints = CONFIG.points;
            const revolutions = 200; 
            for (let i = 0; i < totalPoints; i++) {
                const progress = i / totalPoints;
                const phi = progress * Math.PI * 2 * revolutions;
                const theta = (progress * Math.PI) - (Math.PI / 2);
                const r1 = superShape(phi, p.m, p.n1, p.n2, p.n3, p.a, p.b);
                const r2 = superShape(theta, p.m, p.n1, p.n2, p.n3, p.a, p.b);
                const x = finalScale * r1 * Math.cos(phi) * r2 * Math.cos(theta);
                const y = finalScale * r1 * Math.sin(phi) * r2 * Math.cos(theta);
                const z = finalScale * r2 * Math.sin(theta);
                arr[idx++] = x;
                arr[idx++] = y;
                arr[idx++] = z;
            }
            posAttribute.needsUpdate = true;
        }

        update() {
            const now = Date.now();
            if (!this.isTransitioning) {
                if (now - this.lastSwitchTime > this.holdTime) {
                    this.startTransition(now);
                }
            } else {
                const elapsed = now - this.transitionStartTime;
                const rawProgress = Math.min(elapsed / this.duration, 1.0);
                const progress = rawProgress < 0.5 ? 2 * rawProgress * rawProgress : 1 - Math.pow(-2 * rawProgress + 2, 2) / 2;
                material.uniforms.uTransition.value = progress;
                const startS = SHAPES[this.currentIndex];
                const endS = SHAPES[this.nextIndex];
                this.currentParams.m = THREE.MathUtils.lerp(startS.params.m, endS.params.m, progress);
                this.currentParams.n1 = THREE.MathUtils.lerp(startS.params.n1, endS.params.n1, progress);
                this.currentParams.n2 = THREE.MathUtils.lerp(startS.params.n2, endS.params.n2, progress);
                this.currentParams.n3 = THREE.MathUtils.lerp(startS.params.n3, endS.params.n3, progress);
                this.currentScaleMult = THREE.MathUtils.lerp(startS.scaleMultiplier, endS.scaleMultiplier, progress);
                this.updateGeometry();
                document.getElementById('val-m').textContent = this.currentParams.m.toFixed(1);
                document.getElementById('val-n1').textContent = this.currentParams.n1.toFixed(1);
                document.getElementById('val-n2').textContent = this.currentParams.n2.toFixed(1);
                document.getElementById('val-n3').textContent = this.currentParams.n3.toFixed(1);
                if (rawProgress >= 1.0) {
                    this.completeTransition(now);
                }
            }
        }

        startTransition(now) {
            this.isTransitioning = true;
            this.transitionStartTime = now;
            const nextTheme = SHAPES[this.nextIndex];
            material.uniforms.uColorB1.value.setHex(nextTheme.accent[0]);
            material.uniforms.uColorB2.value.setHex(nextTheme.accent[1]);
            material.uniforms.uColorB3.value.setHex(nextTheme.accent[2]);
            this.updateUI(nextTheme.name, nextTheme.accent[1]);
        }

        completeTransition(now) {
            this.isTransitioning = false;
            this.lastSwitchTime = now;
            material.uniforms.uTransition.value = 0.0;
            material.uniforms.uColorA1.value.copy(material.uniforms.uColorB1.value);
            material.uniforms.uColorA2.value.copy(material.uniforms.uColorB2.value);
            material.uniforms.uColorA3.value.copy(material.uniforms.uColorB3.value);
            this.currentIndex = this.nextIndex;
            this.nextIndex = (this.nextIndex + 1) % SHAPES.length;
        }
    }

    const shapeManager = new ShapeManager();
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    }

    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        material.uniforms.time.value += delta;
        line.rotation.x += delta * 0.1;
        line.rotation.y += delta * 0.05;
        stars.rotation.y += delta * 0.001;
        shapeManager.update();
        controls.update();
        composer.render();
    }
    animate();
</script>
</body>
</html>
