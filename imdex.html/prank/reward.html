<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Reward</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle, #141e30, #243b55);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Montserrat', sans-serif;
      color: white;
      text-align: center;
    }

    img {
      max-width: 80%;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(255,255,255,0.4);
      margin-bottom: 20px;
    }

    p {
      font-size: 22px;
    }
  </style>
</head>
<body>

  <img src="image.jpg" alt="Reward Image">

  <p>Enjoy your surprise 🎉</p>

  <audio autoplay loop>
    <source src="sound.mp3" type="audio/mpeg">
  </audio>

</body>
</html>
